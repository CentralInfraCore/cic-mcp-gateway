---
title: System Architecture Overview — cic-mcp-gateway
description: >
  Provides a high-level overview of the cic-mcp-gateway component's architecture and
  its role within the cic-mcp-* family.

concepts:
  - name: The "Gateway layer" concept
    summary: >
      This component stores nothing — it translates the session/workdir/knowledge/shared
      sources into a single, trust-marked context package (GatewayContextEnvelope).
    component_map:
      - id: cic-mcp-knowledge
        role: reviewed/canonical knowledge, versioned
      - id: cic-mcp-workdir
        role: "current repo/worktree/branch/diff (role filled by cic-factory)"
      - id: cic-mcp-session
        role: session-scope event, timeline, chunk, retrieval, provenance
      - id: cic-mcp-shared
        role: cross-session memory, weighting, conflict
      - id: cic-mcp-gateway
        role: "trust-domain aware context compiler — THIS REPO"
      - id: cic-mcp-factory
        role: the family's capability production/maintenance factory

  - name: Boundaries
    summary: What belongs to the gateway layer's responsibility, and what does not.
    yes:
      - query intent recognition
      - trust-domain source routing
      - source registry usage
      - surfacing conflicts/proof
      - assembling GatewayContextEnvelope
      - agent-facing context API
    no:
      - raw event store
      - embedding store
      - factory runner
      - canonical promotion
    forbidden_shortcuts:
      - "gateway != proxy"
      - "gateway != vector store"
      - "route_query != search_all"

  - name: Trust model
    summary: The gateway layer's trust marking.
    trust:
      gateway_role: trust_domain_context_compiler
      owns_raw_storage: false
      owns_embedding_store: false
      returns_trust_envelope: true

  - name: Planned data flow (not yet implemented)
    summary: >
      Agent query -> intent recognition -> trust-domain routing -> source adapters
      (session/shared/knowledge) -> conflict/proof -> GatewayContextEnvelope.
    diagram: |
      graph TD
          Q[Agent query] --> I[query intent recognition]
          I --> R[trust-domain source routing]
          R --> S1[cic-mcp-session adapter]
          R --> S2[cic-mcp-shared adapter]
          R --> S3[cic-mcp-knowledge adapter]
          S1 & S2 & S3 --> C[surface conflict/proof]
          C --> E[GatewayContextEnvelope]
    envelope_fields:
      - answer_type
      - query_intent
      - scope
      - sources_used
      - trust_summary
      - canonical_facts
      - workdir_facts
      - session_derived_notes
      - shared_memory_notes
      - conflicts
      - proof_requirements
      - refs
    capability_job_order:
      - gateway-context-envelope-contract-001
      - gateway-session-adapter-contract-001

  - name: Current state
    summary: >
      The repo was bootstrapped from the base-repo mcp/main MCP server scaffold
      (2026-06-20) — this closes the bootstrap branch of
      gateway-repo-baseline-or-bootstrap-001. No gateway-specific content is
      implemented yet.
