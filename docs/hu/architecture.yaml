---
title: Rendszer Architektúra Áttekintés — cic-mcp-gateway
description: >
  A cic-mcp-gateway komponens magas szintű architektúráját és a cic-mcp-* családban
  betöltött szerepét mutatja be.

concepts:
  - name: A "Gateway réteg" koncepció
    summary: >
      Ez a komponens nem tárol semmit — a session/workdir/knowledge/shared forrásokat
      fordítja egységes, trust-jelölt kontextus-csomaggá (GatewayContextEnvelope).
    component_map:
      - id: cic-mcp-knowledge
        role: reviewed/canonical tudás, verziózott
      - id: cic-mcp-workdir
        role: "aktuális repo/worktree/branch/diff (= cic-factory szerepe)"
      - id: cic-mcp-session
        role: session-scope event, timeline, chunk, retrieval, provenance
      - id: cic-mcp-shared
        role: cross-session memória, súlyozás, konfliktus
      - id: cic-mcp-gateway
        role: "trust-domain aware context compiler — EZ A REPO"
      - id: cic-mcp-factory
        role: a család capability gyártó/karbantartó factory-ja

  - name: Fő határok
    summary: Mi tartozik a gateway réteg felelősségébe, és mi nem.
    yes:
      - query intent felismerés
      - trust-domain source routing
      - source registry használat
      - conflict/proof felszínre hozása
      - GatewayContextEnvelope összeállítása
      - agent-facing context API
    no:
      - raw event store
      - embedding store
      - factory runner
      - canonical promotion
    forbidden_shortcuts:
      - "gateway != proxy"
      - "gateway != vector store"
      - "route_query != search_all"

  - name: Trust modell
    summary: A gateway réteg trust-jelölése.
    trust:
      gateway_role: trust_domain_context_compiler
      owns_raw_storage: false
      owns_embedding_store: false
      returns_trust_envelope: true

  - name: Tervezett adatfolyam (még nem implementált)
    summary: >
      Agent query -> intent felismerés -> trust-domain routing -> source adapterek
      (session/shared/knowledge) -> conflict/proof -> GatewayContextEnvelope.
    diagram: |
      graph TD
          Q[Agent query] --> I[query intent felismeres]
          I --> R[trust-domain source routing]
          R --> S1[cic-mcp-session adapter]
          R --> S2[cic-mcp-shared adapter]
          R --> S3[cic-mcp-knowledge adapter]
          S1 & S2 & S3 --> C[conflict/proof felszinre hozasa]
          C --> E[GatewayContextEnvelope]
    envelope_fields:
      - answer_type
      - query_intent
      - scope
      - sources_used
      - trust_summary
      - canonical_facts
      - workdir_facts
      - session_derived_notes
      - shared_memory_notes
      - conflicts
      - proof_requirements
      - refs
    capability_job_order:
      - gateway-context-envelope-contract-001
      - gateway-session-adapter-contract-001

  - name: Jelenlegi állapot
    summary: >
      A repo a base-repo mcp/main MCP-szerver scaffold-jából lett bootstrapelve
      (2026-06-20) — a gateway-repo-baseline-or-bootstrap-001 job bootstrap-ága
      ezzel lezárva. Gateway-specifikus tartalom még nincs implementálva.
